dependsOn:
  - 'codemod-runner'
  - 'codemods/rewrite-internal-imports'
  - 'codemods/rewrite-relative-imports'

tasks:
  build:
    extends: 'platform-cli-path'
    command: 'go'
    args:
      - 'build'
      - '-o'
      - '@out(0)'
      - '-ldflags=-s -w'
      - '.'

  test-integration:
    command: 'go'
    args:
      - 'test'
      - './...'
