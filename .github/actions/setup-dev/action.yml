name: Setup Dev
description: Set up Bun, Go, Node, just, and workspace dependencies

inputs:
  npm-auth:
    description: Whether to configure npm registry auth through setup-node
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Read Bun version
      id: tool_versions
      shell: bash
      run: |
        echo "bun=$(sed -n 's/^bun = \"\\(.*\\)\"$/\\1/p' .prototools)" >> "$GITHUB_OUTPUT"

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ steps.tool_versions.outputs.bun }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: cli/go.mod

    - name: Set up Node
      if: ${{ inputs.npm-auth != 'true' }}
      uses: actions/setup-node@v4
      with:
        node-version-file: .node-version

    - name: Set up Node with npm registry
      if: ${{ inputs.npm-auth == 'true' }}
      uses: actions/setup-node@v4
      with:
        node-version-file: .node-version
        registry-url: https://registry.npmjs.org

    - name: Set up just
      uses: taiki-e/install-action@just

    - name: Install workspace dependencies
      shell: bash
      run: bun install --frozen-lockfile
