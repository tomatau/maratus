name: _Consumer Smoke

on:
  workflow_call:
    inputs:
      cli-version:
        required: false
        type: string
        default: latest

jobs:
  consumer-smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up workflow tools
        uses: ./.github/actions/setup-tools

      - name: Create consumer fixture
        env:
          APP_DIR: ${{ runner.temp }}/maratus-consumer-smoke
        run: |
          rm -rf "$APP_DIR"
          cd "$APP_DIR"
          npm init -y

      - name: Install published CLI
        env:
          APP_DIR: ${{ runner.temp }}/maratus-consumer-smoke
          CLI_VERSION: ${{ inputs.cli-version }}
        run: |
          cd "$APP_DIR"
          npm install "@maratus/cli@$CLI_VERSION"

      - name: Initialise consumer project
        env:
          APP_DIR: ${{ runner.temp }}/maratus-consumer-smoke
        run: |
          cd "$APP_DIR"
          npx -- maratus init --yes
          yq -i '.layout.barrel = true' maratus.json

      - name: Inspect installed Maratus packages
        env:
          APP_DIR: ${{ runner.temp }}/maratus-consumer-smoke
        run: |
          cd "$APP_DIR"
          for scope in @maratus @maratus-codemod @maratus-lib @maratus-registry; do
            scope_dir="node_modules/$scope"
            if [ -d "$scope_dir" ]; then
              echo "::group::$scope"
              ls -la "$scope_dir"
              echo "::endgroup::"
            fi
          done

      - name: Run add command
        env:
          APP_DIR: ${{ runner.temp }}/maratus-consumer-smoke
        run: |
          cd "$APP_DIR"
          npx -- maratus --debug add button

      - name: Assert generated files
        env:
          APP_DIR: ${{ runner.temp }}/maratus-consumer-smoke
        run: |
          files=(
            "$APP_DIR/src/components/button/Button.tsx"
            "$APP_DIR/src/components/button/Button.css"
            "$APP_DIR/src/components/button/index.ts"
            "$APP_DIR/src/components/button/use-button.ts"
            "$APP_DIR/src/styles/maratus-theme.css"
            "$APP_DIR/src/lib/focus-modality/index.ts"
            "$APP_DIR/src/lib/focus-modality/use-focus-modality.ts"
            "$APP_DIR/src/lib/focus-modality/use-is-focus-visible.ts"
            "$APP_DIR/src/lib/store-runtime/create-store-runtime.ts"
            "$APP_DIR/src/lib/store-runtime/create-store.ts"
            "$APP_DIR/src/lib/store-runtime/index.ts"
            "$APP_DIR/src/lib/store-runtime/types.ts"
            "$APP_DIR/src/lib/store-runtime/use-store-runtime.ts"
            "$APP_DIR/src/lib/store-runtime/use-store-selector.ts"
            "$APP_DIR/maratus-components.json"
          )

          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing expected file: $file" >&2
              exit 1
            fi
          done

          if ! grep -q '"button"' "$APP_DIR/maratus-components.json"; then
            echo 'Expected "button" entry in maratus-components.json' >&2
            cat "$APP_DIR/maratus-components.json" >&2
            exit 1
          fi
