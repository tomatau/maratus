name: _Changeset Check

on:
  workflow_call:
    inputs:
      base-sha:
        required: true
        type: string
      manifest-affected:
        required: true
        type: string

jobs:
  changeset-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Moon toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          auto-setup: true

      - name: Verify changeset for manifest-affecting changes
        env:
          MANIFEST_AFFECTED: ${{ inputs.manifest-affected }}
        run: |
          if [ "$MANIFEST_AFFECTED" != "true" ]; then
            exit 0
          fi

          status_path='tmp/changeset-status.json'
          release_query='.releases[] | select(.name == "@maratus/manifest")'

          mkdir -p tmp
          set +e
          bunx @changesets/cli status \
            --since=${{ inputs.base-sha }} \
            --output="$status_path"
          set -e

          if [ -f "$status_path" ] && jq -e "$release_query" "$status_path" >/dev/null; then
            exit 0
          fi

          echo "Manifest-affecting changes require a changeset that releases @maratus/manifest." >&2
          exit 1
