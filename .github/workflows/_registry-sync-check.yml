name: _Registry Sync Check

on:
  workflow_call:

jobs:
  registry-sync-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Moon toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          auto-setup: true

      - name: Rebuild registry artefacts
        run: moon run tools-build-registry:build

      - name: Fail on generated diff
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git diff --stat
          echo "Registry artefacts are out of date. Run the `just build registry` and check in the result." >&2
          exit 1
