name: _NPM Publish PR

on:
  workflow_call:
    inputs:
      cli-affected:
        required: true
        type: string
      manifest-affected:
        required: true
        type: string
      pr-number:
        required: true
        type: string
      branch-name:
        required: true
        type: string
      head-sha:
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: true
    outputs:
      cli-version:
        description: Effective @maratus/cli version after snapshot versioning
        value: ${{ jobs.publish.outputs.cli-version }}

jobs:
  publish:
    uses: ./.github/workflows/_npm-publish.yml
    with:
      cli-affected: ${{ inputs.cli-affected }}
      manifest-affected: ${{ inputs.manifest-affected }}
      publish-command: |
        dist_tag=$(yq -r '.channels.pr.distTag' release.yml)
        bun run changeset publish --tag "$dist_tag"
      pr-number: ${{ inputs.pr-number }}
      branch-name: ${{ inputs.branch-name }}
      head-sha: ${{ inputs.head-sha }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
