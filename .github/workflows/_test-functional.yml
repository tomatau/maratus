name: _Test Functional

on:
  workflow_call:
    inputs:
      base-sha:
        required: true
        type: string
      head-sha:
        required: true
        type: string

jobs:
  test-functional:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Moon toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          auto-setup: true

      - name: Cache Playwright browser binaries
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-shell-linux-${{ hashFiles('tools/playwright/package.json') }}
          restore-keys: |
            playwright-shell-linux-

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps --only-shell

      - name: Run affected functional tests
        run: |
          moon ci :test \
            --base "${{ inputs.base-sha }}" \
            --head "${{ inputs.head-sha }}" \
            --include-relations
