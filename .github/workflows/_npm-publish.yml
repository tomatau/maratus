name: _NPM Publish

on:
  workflow_call:
    outputs:
      cli-version:
        description: Effective @maratus/cli version after versioning
        value: ${{ jobs.publish.outputs.cli-version }}
    secrets:
      NPM_TOKEN:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      cli-version: ${{ steps.cli_version.outputs.value }}
    permissions:
      contents: write
    env:
      RELEASE_BOT_NAME: github-actions[bot]
      RELEASE_BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up development tools
        uses: ./.github/actions/setup-dev
        with:
          npm-auth: 'true'

      - name: Build registry artefacts
        run: just build artifacts

      - name: Build manifest package
        run: just build packages maratus-manifest

      - name: Build codemod runner
        run: just build packages maratus-codemod-runner

      - name: Build codemods
        run: just build codemods

      - name: Stage platform CLI binaries
        run: |
          just cli-stage-platform maratus-cli-darwin-arm64 darwin arm64 maratus
          just cli-stage-platform maratus-cli-darwin-x64 darwin amd64 maratus
          just cli-stage-platform maratus-cli-linux-x64 linux amd64 maratus
          just cli-stage-platform maratus-cli-win32-x64 windows amd64 maratus.exe

      - name: Version packages
        run: just changeset version

      - name: Read CLI version
        id: cli_version
        run: |
          version=$(sed -n 's/^  "version": "\(.*\)",$/\1/p' packages/maratus-cli/package.json)
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Detect release changes
        id: release_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: ${{ steps.release_changes.outputs.has_changes == 'true' }}
        run: |
          git config user.name "$RELEASE_BOT_NAME"
          git config user.email "$RELEASE_BOT_EMAIL"

      - name: Commit version changes
        if: ${{ steps.release_changes.outputs.has_changes == 'true' }}
        run: |
          git add -A
          git commit -m "chore(release): publish stable packages [skip ci]"

      - name: Publish packages
        if: ${{ steps.release_changes.outputs.has_changes == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: just changeset publish

      - name: Push release commit
        if: ${{ steps.release_changes.outputs.has_changes == 'true' }}
        run: git push origin HEAD:main
