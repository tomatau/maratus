name: _Test Integration

on:
  workflow_call:
    inputs:
      base-sha:
        required: true
        type: string
      head-sha:
        required: true
        type: string

jobs:
  test-integration:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download codemod runner artefact
        uses: actions/download-artifact@v8
        with:
          name: maratus-codemod-runner
          path: packages/maratus-codemod-runner

      - name: Download codemod artefacts
        uses: actions/download-artifact@v8
        with:
          name: maratus-codemods
          path: codemods

      - name: Set up Moon toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          auto-setup: true

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Run affected integration tests
        run: |
          moon ci :test-integration \
            --base "${{ inputs.base-sha }}" \
            --head "${{ inputs.head-sha }}" \
            --include-relations
