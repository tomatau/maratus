name: _CI Context

on:
  workflow_call:
    inputs:
      base-sha:
        required: true
        type: string
      head-sha:
        required: true
        type: string
    outputs:
      cli_affected:
        description: Whether CLI smoke should run
        value: ${{ jobs.ci-context.outputs.cli_affected }}
      manifest_affected:
        description: Whether the manifest package is affected
        value: ${{ jobs.ci-context.outputs.manifest_affected }}
      test_affected:
        description: Whether any functional test tasks are affected
        value: ${{ jobs.ci-context.outputs.test_affected }}
      test_unit_affected:
        description: Whether any unit test tasks are affected
        value: ${{ jobs.ci-context.outputs.test_unit_affected }}
      test_integration_affected:
        description: Whether any integration test tasks are affected
        value: ${{ jobs.ci-context.outputs.test_integration_affected }}
      cli_platform_matrix:
        description: CLI platform matrix JSON
        value: ${{ jobs.ci-context.outputs.cli_platform_matrix }}

jobs:
  ci-context:
    runs-on: ubuntu-latest
    outputs:
      cli_affected: ${{ steps.cli_affected.outputs.value }}
      test_affected: ${{ steps.test_affected.outputs.value }}
      test_unit_affected: ${{ steps.test_unit_affected.outputs.value }}
      test_integration_affected: ${{ steps.test_integration_affected.outputs.value }}
      manifest_affected: ${{ steps.manifest_affected.outputs.value }}
      cli_platform_matrix: ${{ steps.cli_matrix.outputs.value }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Moon toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          auto-setup: true

      - name: Set up workflow tools
        uses: ./.github/actions/setup-tools

      - name: Detect CLI changes
        id: cli_affected_moon
        env:
          MOON_BASE: ${{ inputs.base-sha }}
          MOON_HEAD: ${{ inputs.head-sha }}
        run: |
          affected=$(moon query affected --downstream deep)

          if jq -e '.projects["cli-wrapper"]' <<<"$affected" >/dev/null
          then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect affected functional tests
        id: test_affected
        env:
          MOON_BASE: ${{ inputs.base-sha }}
          MOON_HEAD: ${{ inputs.head-sha }}
        run: |
          affected=$(moon query tasks --affected --id test)

          if jq -e '[.tasks[] | select(has("test"))] | length > 0' <<<"$affected" >/dev/null
          then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect affected unit tests
        id: test_unit_affected
        env:
          MOON_BASE: ${{ inputs.base-sha }}
          MOON_HEAD: ${{ inputs.head-sha }}
        run: |
          affected=$(moon query tasks --affected --id test-unit)

          if jq -e '[.tasks[] | select(has("test-unit"))] | length > 0' <<<"$affected" >/dev/null
          then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect affected integration tests
        id: test_integration_affected
        env:
          MOON_BASE: ${{ inputs.base-sha }}
          MOON_HEAD: ${{ inputs.head-sha }}
        run: |
          affected=$(moon query tasks --affected --id test-integration)

          if jq -e '[.tasks[] | select(has("test-integration"))] | length > 0' <<<"$affected" >/dev/null
          then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect manifest changes
        id: manifest_affected_moon
        env:
          MOON_BASE: ${{ inputs.base-sha }}
          MOON_HEAD: ${{ inputs.head-sha }}
        run: |
          affected=$(moon query affected --downstream deep)

          if jq -e '.tasks["manifest:build"]' <<<"$affected" >/dev/null
          then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect pending release context
        id: pending_release_context
        run: |
          status_path='tmp/changeset-status.json'
          cli_affected=false
          manifest_affected=false

          packages_scope=$(yq -r '.workspaces.packages.scope' repo.yml)
          codemods_scope=$(yq -r '.workspaces.codemods.scope' repo.yml)

          mapfile -t manifest_scopes < <(
            yq -r '
              .workspaces
              | to_entries[]
              | select(.value.consumption != "none")
              | select(.key != "packages" and .key != "codemods")
              | .value.scope
            ' repo.yml
          )

          mkdir -p tmp
          set +e
          bunx @changesets/cli status --output="$status_path"
          status_exit=$?
          set -e

          if [ "$status_exit" -ne 0 ] && [ ! -f "$status_path" ]; then
            echo "cli=false" >> "$GITHUB_OUTPUT"
            echo "manifest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r package_name; do
            [ -n "$package_name" ] || continue

            if [ "$package_name" = '@maratus/manifest' ]; then
              manifest_affected=true
              continue
            fi

            if [[ "$package_name" == "$codemods_scope"* ]]; then
              cli_affected=true
              manifest_affected=true
              continue
            fi

            if [[ "$package_name" == "$packages_scope"* ]]; then
              cli_affected=true
              continue
            fi

            for scope in "${manifest_scopes[@]}"; do
              if [[ "$package_name" == "$scope"* ]]; then
                manifest_affected=true
                break
              fi
            done
          done < <(jq -r '.releases[]?.name // empty' "$status_path")

          echo "cli=$cli_affected" >> "$GITHUB_OUTPUT"
          echo "manifest=$manifest_affected" >> "$GITHUB_OUTPUT"

      - name: Finalise CLI affected flag
        id: cli_affected
        env:
          MOON_AFFECTED: ${{ steps.cli_affected_moon.outputs.value }}
          PENDING_AFFECTED: ${{ steps.pending_release_context.outputs.cli }}
        run: |
          if [ "$MOON_AFFECTED" = 'true' ] || [ "$PENDING_AFFECTED" = 'true' ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Finalise manifest affected flag
        id: manifest_affected
        env:
          MOON_AFFECTED: ${{ steps.manifest_affected_moon.outputs.value }}
          PENDING_AFFECTED: ${{ steps.pending_release_context.outputs.manifest }}
        run: |
          if [ "$MOON_AFFECTED" = 'true' ] || [ "$PENDING_AFFECTED" = 'true' ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Emit CLI platform matrix
        id: cli_matrix
        run: |
          {
            echo 'value<<EOF'
            cat <<'EOF'
          {
            "include": [
              {
                "name": "macOS arm64",
                "runner": "macos-latest",
                "package": "maratus-cli-darwin-arm64",
                "goos": "darwin",
                "goarch": "arm64",
                "binary": "maratus"
              },
              {
                "name": "Linux x64",
                "runner": "ubuntu-latest",
                "package": "maratus-cli-linux-x64",
                "goos": "linux",
                "goarch": "amd64",
                "binary": "maratus"
              },
              {
                "name": "Windows x64",
                "runner": "windows-latest",
                "package": "maratus-cli-win32-x64",
                "goos": "windows",
                "goarch": "amd64",
                "binary": "maratus.exe"
              }
            ]
          }
          EOF
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
