name: _Build CLI

on:
  workflow_call:
    inputs:
      cli-platform-matrix:
        required: true
        type: string

jobs:
  build-codemod-runner:
    name: Build codemod runner
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure local main branch
        run: |
          if ! git show-ref --verify --quiet refs/heads/main; then
            git branch main origin/main
          fi

      - name: Set up Moon toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          auto-setup: true

      - name: Build codemod runner
        run: moon run codemod-runner:build

      - name: Upload codemod runner artefact
        uses: actions/upload-artifact@v4
        with:
          name: maratus-codemod-runner
          path: packages/maratus-codemod-runner

  build-cli:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.cli-platform-matrix) }}

    defaults:
      run:
        shell: bash

    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CLI_PLATFORM_PACKAGE: ${{ matrix.package }}
      CLI_BINARY_NAME: ${{ matrix.binary }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure local main branch
        run: |
          if ! git show-ref --verify --quiet refs/heads/main; then
            git branch main origin/main
          fi

      - name: Set up Moon toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          auto-setup: true

      - name: Build platform CLI binary
        run: moon run cli-go:build

      - name: Upload platform package artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: packages/${{ matrix.package }}
