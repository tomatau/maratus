name: _Build CLI

on:
  workflow_call:
    inputs:
      cli-platform-matrix:
        required: true
        type: string

jobs:
  build-cli:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.cli-platform-matrix) }}

    defaults:
      run:
        shell: bash

    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CLI_PLATFORM_PACKAGE: ${{ matrix.package }}
      CLI_BINARY_NAME: ${{ matrix.binary }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Moon toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          auto-setup: true

      - name: Build platform CLI binary
        run: moon run cli-go:build

      - name: Upload platform package artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: packages/${{ matrix.package }}
