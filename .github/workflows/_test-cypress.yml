name: _Test Cypress

on:
  workflow_call:
    inputs:
      base-sha:
        required: true
        type: string
      head-sha:
        required: true
        type: string

jobs:
  test-cypress:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Moon toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          auto-setup: true

      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-linux-${{ hashFiles('tools/cypress/package.json') }}
          restore-keys: |
            cypress-linux-

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Run affected Cypress tests
        run: |
          moon ci :test-cypress \
            --base "${{ inputs.base-sha }}" \
            --head "${{ inputs.head-sha }}" \
            --include-relations
