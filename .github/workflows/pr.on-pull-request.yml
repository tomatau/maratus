name: PR on Pull Request

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  ci-context:
    uses: ./.github/workflows/_ci-context.yml
    with:
      base-sha: ${{ github.event.pull_request.base.sha }}
      head-sha: ${{ github.event.pull_request.head.sha }}

  changeset-check:
    needs: ci-context
    uses: ./.github/workflows/_changeset-check.yml
    with:
      base-sha: ${{ github.event.pull_request.base.sha }}
      manifest-affected: ${{ needs.ci-context.outputs.manifest_affected }}

  registry-sync-check:
    needs: ci-context
    uses: ./.github/workflows/_registry-sync-check.yml

  changeset-signal:
    needs: ci-context
    uses: ./.github/workflows/_changeset-signal.yml
    with:
      base-sha: ${{ github.event.pull_request.base.sha }}
      head-sha: ${{ github.event.pull_request.head.sha }}
      pr-number: ${{ github.event.pull_request.number }}

  test-unit:
    needs: ci-context
    if: ${{ needs.ci-context.outputs.test_unit_affected == 'true' }}
    uses: ./.github/workflows/_test-unit.yml
    with:
      base-sha: ${{ github.event.pull_request.base.sha }}
      head-sha: ${{ github.event.pull_request.head.sha }}

  test-functional:
    needs: ci-context
    if: ${{ needs.ci-context.outputs.test_affected == 'true' }}
    uses: ./.github/workflows/_test-functional.yml
    with:
      base-sha: ${{ github.event.pull_request.base.sha }}
      head-sha: ${{ github.event.pull_request.head.sha }}

  build-cli:
    needs: ci-context
    if: ${{ needs.ci-context.outputs.cli_affected == 'true' }}
    uses: ./.github/workflows/_build-cli.yml
    with:
      cli-platform-matrix: ${{ needs.ci-context.outputs.cli_platform_matrix }}

  build-manifest:
    needs: ci-context
    if: >-
      ${{
        needs.ci-context.outputs.manifest_affected == 'true' ||
        needs.ci-context.outputs.cli_affected == 'true'
      }}
    uses: ./.github/workflows/_build-manifest.yml

  test-integration:
    needs:
      - ci-context
      - build-cli
      - build-manifest
    if: ${{ needs.ci-context.outputs.test_integration_affected == 'true' }}
    uses: ./.github/workflows/_test-integration.yml
    with:
      base-sha: ${{ github.event.pull_request.base.sha }}
      head-sha: ${{ github.event.pull_request.head.sha }}

  cli-smoke:
    needs:
      - ci-context
      - build-cli
      - test-integration
      - test-unit
      - test-functional
    if: >-
      ${{
        always() &&
        needs.ci-context.outputs.cli_affected == 'true' &&
        contains(fromJson('["success","skipped"]'), needs.build-cli.result) &&
        contains(fromJson('["success","skipped"]'), needs.test-integration.result) &&
        contains(fromJson('["success","skipped"]'), needs.test-unit.result) &&
        contains(fromJson('["success","skipped"]'), needs.test-functional.result)
      }}
    uses: ./.github/workflows/_cli-smoke.yml
    with:
      cli-platform-matrix: ${{ needs.ci-context.outputs.cli_platform_matrix }}

  publish-pr:
    needs:
      - ci-context
      - build-cli
      - build-manifest
      - test-integration
      - test-unit
      - test-functional
      - cli-smoke
    if: >-
      ${{
        always() &&
        (
          needs.ci-context.outputs.cli_affected == 'true' ||
          needs.ci-context.outputs.manifest_affected == 'true'
        ) &&
        contains(fromJson('["success","skipped"]'), needs.build-cli.result) &&
        contains(fromJson('["success","skipped"]'), needs.build-manifest.result) &&
        contains(fromJson('["success","skipped"]'), needs.test-integration.result) &&
        contains(fromJson('["success","skipped"]'), needs.test-unit.result) &&
        contains(fromJson('["success","skipped"]'), needs.test-functional.result) &&
        contains(fromJson('["success","skipped"]'), needs.cli-smoke.result)
      }}
    uses: ./.github/workflows/_npm-publish-pr.yml
    with:
      cli-affected: ${{ needs.ci-context.outputs.cli_affected }}
      manifest-affected: ${{ needs.ci-context.outputs.manifest_affected }}
      pr-number: ${{ github.event.pull_request.number }}
      branch-name: ${{ github.event.pull_request.head.ref }}
      head-sha: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  consumer-smoke:
    needs: publish-pr
    uses: ./.github/workflows/_consumer-smoke.yml
    with:
      cli-version: ${{ needs.publish-pr.outputs.cli-version }}
