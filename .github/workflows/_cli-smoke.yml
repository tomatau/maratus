name: _CLI Smoke

on:
  workflow_call:
    inputs:
      cli-platform-matrix:
        required: true
        type: string

jobs:
  cli-smoke:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.cli-platform-matrix) }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download platform package artefact
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.package }}
          path: packages/${{ matrix.package }}

      - name: Run wrapper smoke test
        run: npm exec --prefix packages/maratus-cli -- maratus --help
