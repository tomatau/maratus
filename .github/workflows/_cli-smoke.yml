name: _CLI Smoke

on:
  workflow_call:
    inputs:
      cli-platform-matrix:
        required: true
        type: string

jobs:
  cli-smoke:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.cli-platform-matrix) }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Moon toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          auto-setup: true

      - name: Download platform package artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.package }}
          path: packages/${{ matrix.package }}

      - name: Debug downloaded platform package
        run: |
          find packages -maxdepth 4 -type f | sort
          ls -l packages/${{ matrix.package }} || true
          ls -l packages/${{ matrix.package }}/bin || true

      - name: Restore CLI executable bit
        run: chmod +x "packages/${{ matrix.package }}/bin/${{ matrix.binary }}"

      - name: Link workspace packages
        run: bun install --frozen-lockfile

      - name: Run wrapper smoke test
        run: npm exec --prefix packages/maratus-cli -- maratus --help
