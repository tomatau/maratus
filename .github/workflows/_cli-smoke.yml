name: _CLI Smoke

on:
  workflow_call:

jobs:
  cli-smoke:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-14
            package: maratus-cli-darwin-arm64
            goos: darwin
            goarch: arm64
            binary: maratus
          - name: Linux x64
            runner: ubuntu-latest
            package: maratus-cli-linux-x64
            goos: linux
            goarch: amd64
            binary: maratus
          - name: Windows x64
            runner: windows-latest
            package: maratus-cli-win32-x64
            goos: windows
            goarch: amd64
            binary: maratus.exe

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up development tools
        uses: ./.github/actions/setup-dev

      - name: Stage native CLI binary
        run: |
          just cli-stage-platform \
            ${{ matrix.package }} \
            ${{ matrix.goos }} \
            ${{ matrix.goarch }} \
            ${{ matrix.binary }}

      - name: Run wrapper smoke test
        run: node packages/maratus-cli/bin/maratus.mjs --help
