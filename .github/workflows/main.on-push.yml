name: Main on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: main-on-push
  cancel-in-progress: false

jobs:
  ci-context:
    uses: ./.github/workflows/_ci-context.yml
    with:
      base-sha: ${{ github.event.before }}
      head-sha: ${{ github.sha }}

  test-unit:
    needs: ci-context
    if: ${{ needs.ci-context.outputs.test_unit_affected == 'true' }}
    uses: ./.github/workflows/_test-unit.yml
    with:
      base-sha: ${{ github.event.before }}
      head-sha: ${{ github.sha }}

  test-functional:
    needs: ci-context
    if: ${{ needs.ci-context.outputs.test_affected == 'true' }}
    uses: ./.github/workflows/_test-functional.yml
    with:
      base-sha: ${{ github.event.before }}
      head-sha: ${{ github.sha }}

  build-cli:
    needs: ci-context
    if: ${{ needs.ci-context.outputs.cli_affected == 'true' }}
    uses: ./.github/workflows/_build-cli.yml
    with:
      cli-platform-matrix: ${{ needs.ci-context.outputs.cli_platform_matrix }}

  build-manifest:
    needs: ci-context
    if: ${{ needs.ci-context.outputs.manifest_affected == 'true' }}
    uses: ./.github/workflows/_build-manifest.yml

  test-integration:
    needs:
      - ci-context
      - build-cli
    if: ${{ needs.ci-context.outputs.test_integration_affected == 'true' }}
    uses: ./.github/workflows/_test-integration.yml
    with:
      base-sha: ${{ github.event.before }}
      head-sha: ${{ github.sha }}

  cli-smoke:
    needs:
      - ci-context
      - build-cli
      - test-integration
      - test-unit
      - test-functional
    if: >-
      ${{
        always() &&
        needs.ci-context.outputs.cli_affected == 'true' &&
        contains(fromJson('["success","skipped"]'), needs.build-cli.result) &&
        contains(fromJson('["success","skipped"]'), needs.test-integration.result) &&
        contains(fromJson('["success","skipped"]'), needs.test-unit.result) &&
        contains(fromJson('["success","skipped"]'), needs.test-functional.result)
      }}
    uses: ./.github/workflows/_cli-smoke.yml
    with:
      cli-platform-matrix: ${{ needs.ci-context.outputs.cli_platform_matrix }}

  npm-publish:
    needs:
      - ci-context
      - cli-smoke
    uses: ./.github/workflows/_npm-publish.yml
    with:
      cli-affected: ${{ needs.ci-context.outputs.cli_affected }}
    secrets: inherit

  consumer-smoke:
    needs: npm-publish
    uses: ./.github/workflows/_consumer-smoke.yml
    with:
      cli-version: ${{ needs.npm-publish.outputs.cli-version }}
