name: Main on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: main-on-push
  cancel-in-progress: false

jobs:
  test-unit:
    uses: ./.github/workflows/_test-unit.yml
    with:
      base-sha: ${{ github.event.before }}
      head-sha: ${{ github.sha }}

  test-functional:
    uses: ./.github/workflows/_test-functional.yml
    with:
      base-sha: ${{ github.event.before }}
      head-sha: ${{ github.sha }}

  cli-smoke:
    needs:
      - test-unit
      - test-functional
    uses: ./.github/workflows/_cli-smoke.yml

  npm-publish:
    needs: cli-smoke
    uses: ./.github/workflows/_npm-publish.yml
    secrets: inherit

  consumer-smoke:
    needs: npm-publish
    uses: ./.github/workflows/_consumer-smoke.yml
    with:
      cli-version: ${{ needs.npm-publish.outputs.cli-version }}
