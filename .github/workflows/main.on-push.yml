name: Main on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: main-on-push
  cancel-in-progress: false

jobs:
  cli-smoke:
    uses: ./.github/workflows/_cli-smoke.yml

  npm-publish:
    needs: cli-smoke
    uses: ./.github/workflows/_npm-publish.yml
    secrets: inherit

  consumer-smoke:
    needs: npm-publish
    uses: ./.github/workflows/_consumer-smoke.yml
    with:
      cli-version: ${{ needs.npm-publish.outputs.cli-version }}
